<!DOCTYPE html>
<html lang="el">

    <title>Harmonic Oscillator - Phase Space Visualization</title>

        body {

            margin: 0;

            background: #252525;

            margin-top: 20px;
            text-align: left;
            border: 1px solid #333;
        }
        .control-group { display: flex; flex-direction: column; }

            grid-column: span 2;
            padding: 12px;
            background: #00ffcc;
            border: none;
            border-radius: 6px;
            color: #121212;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #00cca3; transform: translateY(-2px); }
    </style>
</head>
